const fmt = (n) => { n = Math.round(n * 2) / 2; return Number.isInteger(n) ? "" + n : n.toFixed(1); };
const pad2 = (n) => String(n).padStart(2, "0");
const keyOf = (d) => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
const todayKey = () => keyOf(new Date());

const CAT_ORDER = { carb: 0, protein: 1, fat: 2, veg: 3, dairy: 4, fruit: 5, whey: 6 };

const domCat = (m) => { let best = "whey", bv = -1; CATS.forEach((c) => { const v = (m.portions && m.portions[c.key]) || 0; if (v > bv) { bv = v; best = c.key; } }); return best; };
const sortMeals = (list) => list.slice().sort((a, b) =>
  (a.time || "").localeCompare(b.time || "") ||
  ((TYPE_ORDER[a.type] ?? 9) - (TYPE_ORDER[b.type] ?? 9)) ||
  ((CAT_ORDER[domCat(a)] ?? 9) - (CAT_ORDER[domCat(b)] ?? 9)));

const parseScheme = (str) => {
  const parts = String(str).split("*");
  const norm = (arr) => (arr.length >= 3 ? arr.slice(0, 3) : [arr[0], arr[0], arr[0]]);
  const reps = norm(parts[0].trim().split("/").map((x) => x.trim()));
  const sets = norm((parts[1] || "1").trim().split("/").map((x) => x.trim()));
  return [0, 1, 2].map((i) => ({ reps: reps[i], sets: sets[i] }));
};

const KEY = "ios_health_v1";
async function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      let st = { ...DEFAULT_STATE, ...saved };
      // day rollover: archive yesterday's daily fields, reset for the new day
      if (st.dayKey !== todayKey()) {
        const h = { ...st.history };
        h[st.dayKey] = {
          ...(h[st.dayKey] || {}),
          weight: parseFloat(st.weight) || (h[st.dayKey] || {}).weight || null,
          sleep: parseFloat(st.sleep) || null,
          steps: parseInt(st.steps) || null,
          water: st.water || 0,
          bowel: st.bowel || 0,
          cardio: st.cardioDone ? (parseInt(st.cardioMin) || 30) : 0,
          dayType: st.dayType,
          train: st.dayType === "training" ? (PLAN_DAYS[st.planDay || 0].focus + (st.cardioDone ? "+" + (st.cardioMin || 30) + "有氧" : "")) : "休息",
          meals: st.meals || [],
        };
        st = { ...st, history: h, dayKey: todayKey(), ...emptyDaily() };
      }
      // retention: keep at most ~3 months (92 days) on device
      const cutoff = keyOf(new Date(Date.now() - 92 * 86400000));
      const hh = { ...st.history };
      let pruned = false;
      Object.keys(hh).forEach((k) => { if (k < cutoff) { delete hh[k]; pruned = true; } });
      if (pruned) st = { ...st, history: hh };
      return st;
    }
  } catch (e) { /* first run */ }
  return { ...DEFAULT_STATE };
}
async function saveState(st) {
  try { localStorage.setItem(KEY, JSON.stringify(st)); }
  catch (e) { console.error("save failed", e); }
}

/* ============ cell-grid primitives (signature tally style) ============ */
function CellRow({ cells }) {
  // insert dashed divider after every 5 cells within each row of 10
  const rows = [];
  for (let r = 0; r < cells.length; r += 10) {
    const chunk = cells.slice(r, r + 10);
    const items = [];
    chunk.forEach((cell, i) => {
      items.push(<Cell key={"c" + r + i} {...cell} />);
      if ((i + 1) % 5 === 0 && i + 1 < chunk.length)
        items.push(<div key={"d" + r + i} style={{ width: 0, height: 20, flex: "none", borderLeft: `1px dashed ${MUTED}`, margin: "0 2px" }} />);
    });
    rows.push(<div key={"r" + r} style={{ display: "flex", alignItems: "center", gap: 4 }}>{items}</div>);
  }
  return <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>{rows}</div>;
}
function Cell({ frac = 0, over = false, transparent = false, label = null, onClick = null }) {
  if (transparent) return <div style={{ width: 20, height: 20, flex: "none", borderRadius: 5, background: "transparent" }} />;
  return (
    <div onClick={onClick || undefined} style={{ width: 20, height: 20, flex: "none", borderRadius: 5, background: over ? OVER_BG : CELL_BG, overflow: label ? "visible" : "hidden", position: "relative", cursor: onClick ? "pointer" : "default" }}>
      {label && (
        <span style={{ position: "absolute", right: "calc(100% + 6px)", top: "50%", transform: "translateY(-50%)", whiteSpace: "nowrap", fontSize: 13, fontWeight: 600, color: INK, display: "flex", alignItems: "center", gap: 5, pointerEvents: "none" }}>
          <span style={{ fontSize: 15 }}>{label.emoji}</span>{label.name}
        </span>
      )}
      <div style={{ width: `${Math.max(0, Math.min(1, frac)) * 100}%`, height: "100%", background: over ? OVER : A, borderRadius: label ? 5 : 0 }} />
    </div>
  );
}

/* ============ charts (SVG, per design) ============ */
function EmptyChart() {
  return (
    <div style={{ height: 150, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, color: PAGE_BG, fontSize: 13, background: SOFT, borderRadius: 12 }}>
      <div style={{ fontSize: 26 }}>📊</div>
      <div>尚無資料，開始記錄後顯示</div>
    </div>
  );
}
function LineChart({ series, unit }) {
  const pts = series.filter((p) => p.val != null);
  if (pts.length === 0) return <EmptyChart />;
  const W = 322, H = 150, pad = 26, pb = 22;
  let mn = Math.min(...pts.map((p) => p.val)), mx = Math.max(...pts.map((p) => p.val));
  if (mn === mx) { mn -= 1; mx += 1; }
  const rng = mx - mn;
  const idx = series.map((p, i) => ({ p, i })).filter((o) => o.p.val != null);
  const X = (i) => (idx.length === 1 ? W / 2 : pad + (i / 13) * (W - pad - 8));
  const Y = (v) => H - pb - ((v - mn) / rng) * (H - pad - pb);
  const d = idx.map((o, k) => (k ? "L" : "M") + X(o.i) + " " + Y(o.p.val)).join(" ");
  const last = idx[idx.length - 1];
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
      <line x1={pad} y1={H - pb} x2={W - 4} y2={H - pb} stroke="#eceef2" strokeWidth={1} />
      {idx.length > 1 && <path d={d} fill="none" stroke={A} strokeWidth={2.4} strokeLinecap="round" strokeLinejoin="round" />}
      {idx.map((o, k) => <circle key={k} cx={X(o.i)} cy={Y(o.p.val)} r={3.5} fill="#fff" stroke={A} strokeWidth={2.4} />)}
      <text x={X(last.i)} y={Y(last.p.val) - 9} fontSize={11} fontWeight={700} fill={A} textAnchor="middle">{fmt(last.p.val) + unit}</text>
    </svg>
  );
}
function BarChart({ series, goal }) {
  if (!series.some((p) => p.val != null)) return <EmptyChart />;
  const W = 322, H = 150, pad = 6, pb = 18;
  let mx = Math.max(goal || 0, ...series.map((p) => p.val || 0)); if (mx <= 0) mx = 1; mx *= 1.1;
  const bw = (W - pad * 2) / 14;
  const gy = goal ? H - pb - (goal / mx) * (H - pb - 10) : null;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
      {goal && (<>
        <line x1={pad} y1={gy} x2={W - pad} y2={gy} stroke={OVER} strokeWidth={1.2} strokeDasharray="4 4" />
        <text x={W - pad} y={gy - 4} fontSize={9} fill={OVER} textAnchor="end">目標</text>
      </>)}
      {series.map((p, i) => {
        const v = p.val || 0; const bh = (v / mx) * (H - pb - 10); const met = goal && v >= goal;
        return <rect key={i} x={pad + i * bw + 2} y={H - pb - bh} width={bw - 4} height={Math.max(0, bh)} rx={3} fill={v ? (met ? A : A + "99") : "#eceef2"} />;
      })}
      <line x1={pad} y1={H - pb} x2={W - pad} y2={H - pb} stroke="#eceef2" strokeWidth={1} />
    </svg>
  );
}

function App() {
  const [st, setSt] = useState(null);
  const [tab, setTab] = useState("today");
  const [toastMsg, setToastMsg] = useState("");
  const [uploading, setUploading] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [mealFilter, setMealFilter] = useState("全部");
  const [editTime, setEditTime] = useState("");
  const autoUpRef = useRef(false);
  const doUploadRef = useRef(null);
  const saveTimer = useRef(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    loadState().then((s) => {
      if (!s.mealTime) s.mealTime = nowTime();
      s.mealDate = todayKey();
      setSt(s);
      saveState(s);
    });
  }, []);

  const update = useCallback((patch) => {
    setSt((prev) => {
      const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
      if (saveTimer.current) clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => saveState(next), 500);
      return next;
    });
  }, []);
  const toast = (msg) => {
    setToastMsg(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(""), 1600);
  };
  const patchHist = (s, patch) => {
    const h = { ...s.history };
    h[s.dayKey] = { ...(h[s.dayKey] || {}), ...patch };
    return h;
  };

  const consumed = useMemo(() => {
    const n = Object.fromEntries(CATS.map((c) => [c.key, 0]));
    if (st) st.meals.forEach((m) => CATS.forEach((c) => { n[c.key] += m.portions[c.key] || 0; }));
    return n;
  }, [st]);

  useEffect(() => {
    if (!st || autoUpRef.current || !st.gasUrl) return;
    const ws = new Date(); ws.setDate(ws.getDate() - ws.getDay());
    if (keyOf(ws) !== st.lastUploadWeek) {
      autoUpRef.current = true;
      setTimeout(() => { doUploadRef.current && doUploadRef.current(true); }, 800);
    }
  }, [st]);

  if (!st) return (
    <div style={{ minHeight: "100vh", background: APP_BG, display: "flex", alignItems: "center", justifyContent: "center", color: MUTED, fontFamily: `-apple-system,BlinkMacSystemFont,'PingFang TC',system-ui,sans-serif` }}>
      載入中…
    </div>
  );

  const isT = st.dayType === "training";
  const tg = isT ? TRAIN : REST;
  const now = new Date();

  /* ---------- meal ops (date-aware) ---------- */
  const mDate = st.mealDate || st.dayKey;
  const mealsFor = (dk) => (dk === st.dayKey ? st.meals : (((st.history[dk] || {}).meals) || []));
  const setMealsFor = (dk, meals) => update((s) => {
    if (dk === s.dayKey) return { ...s, meals };
    const h = { ...s.history };
    h[dk] = { ...(h[dk] || {}), meals };
    return { ...s, history: h };
  });
  const newId = () => Date.now() + Math.random().toString(36).slice(2, 5);
  const addFood = (f) => {
    const val = parseFloat(st.foodAmt) || 0;
    if (val <= 0) return;
    const unit = st.foodUnit;
    const serv = unit === "克" ? Math.round((val / f.g2s) * 2) / 2 : val;
    const portions = Object.fromEntries(CATS.map((c) => [c.key, 0]));
    portions[f.c] = serv;
    const entry = { id: newId(), type: st.mealType, time: st.mealTime || nowTime(), name: f.n, emoji: f.e, portions, amount: val, unit };
    setMealsFor(mDate, [entry, ...mealsFor(mDate)]);
    toast(`已加入 ${f.e} ${f.n}　${val} ${unit}`);
  };
  const addCustom = () => {
    if (!st.customName.trim()) return;
    const cat = CATS.find((c) => c.key === st.customCat);
    const unit = st.customUnit;
    const serv = unit === "克" ? Math.round((st.customServ / 100) * 2) / 2 : st.customServ;
    const portions = Object.fromEntries(CATS.map((c) => [c.key, 0]));
    portions[st.customCat] = serv;
    const entry = { id: newId(), type: st.mealType, time: st.mealTime || nowTime(), name: st.customName.trim(), emoji: cat.emoji, portions, amount: st.customServ, unit };
    update((s) => ({ ...s, customName: "" }));
    setMealsFor(mDate, [entry, ...mealsFor(mDate)]);
    toast(`已加入 ${entry.name}`);
  };
  const delMeal = (m) => setMealsFor(mDate, mealsFor(mDate).filter((x) => x.id !== m.id));
  const addCombo = (combo) => {
    const time = st.mealTime || nowTime();
    const entries = combo.items.map((it) => {
      const portions = Object.fromEntries(CATS.map((c) => [c.key, 0]));
      portions[it.c] = it.serv;
      return { id: newId(), type: st.mealType, time, name: it.n, emoji: it.e, portions, amount: it.amount, unit: it.unit };
    });
    setMealsFor(mDate, [...entries.reverse(), ...mealsFor(mDate)]);
    toast(`已加入組合（${combo.items.length} 項）`);
  };
  const startEdit = (m) => { setEditId(m.id); setEditVal(m.amount != null ? String(m.amount) : ""); setEditTime(m.time || ""); };
  const commitEdit = (m) => {
    const v = parseFloat(editVal);
    const t = editTime || m.time;
    setEditId(null);
    const changedAmt = (v > 0) && (m.amount > 0) && v !== m.amount;
    const changedTime = t !== m.time;
    if (!changedAmt && !changedTime) return;
    let amount = m.amount, portions = m.portions;
    if (changedAmt) {
      const factor = v / m.amount;
      amount = v;
      portions = {};
      CATS.forEach((c) => { portions[c.key] = Math.round(((m.portions[c.key] || 0) * factor) * 100) / 100; });
    }
    setMealsFor(mDate, mealsFor(mDate).map((x) => (x.id === m.id ? { ...x, amount, portions, time: t } : x)));
    toast(`已更新 ${m.name}`);
  };
  const copyLunchToDinner = () => {
    const list = mealsFor(mDate);
    const lunch = list.filter((x) => x.type === "午餐");
    if (!lunch.length) { toast("這天還沒有午餐紀錄"); return; }
    const dinnerTime = "17:00";
    const copies = lunch.map((x) => ({ ...x, id: newId(), type: "晚餐", time: dinnerTime, portions: { ...x.portions } }));
    setMealsFor(mDate, [...copies, ...list]);
    toast(`晚餐＝午餐　已複製 ${lunch.length} 項`);
  };
  const applySort = () => {
    setMealsFor(mDate, sortMeals(mealsFor(mDate)));
    toast("已重新排序");
  };

  /* ---------- weekly cloud upload (Google Apps Script) ---------- */
  const buildPendingDays = () => Object.keys(st.history)
    .filter((k) => k < st.dayKey && k > (st.uploadedThrough || ""))
    .sort();
  const doUpload = async (auto) => {
    if (!st.gasUrl) { if (!auto) toast("請先貼上 Apps Script 網址"); return; }
    const keys = buildPendingDays();
    if (!keys.length) { if (!auto) toast("沒有待上傳的資料"); return; }
    setUploading(true);
    const abbr = { 早餐: "早", 午餐: "午", 晚餐: "晚", 加餐: "加餐", 訓前: "訓前", 訓後: "訓後" };
    const days = keys.map((k) => {
      const h = st.history[k] || {};
      const d = new Date(k + "T00:00:00");
      const groups = {}, order = [];
      sortMeals(h.meals || []).forEach((m) => {
        const gk = m.time + "|" + m.type;
        if (!groups[gk]) { groups[gk] = { time: m.time, type: m.type, items: [], p: Object.fromEntries(CATS.map((c) => [c.key, 0])) }; order.push(gk); }
        groups[gk].items.push(m.amount != null ? m.name + fmt(m.amount) + (m.unit || "") : m.name);
        CATS.forEach((c) => { groups[gk].p[c.key] += m.portions[c.key] || 0; });
      });
      order.sort((a, b) => (groups[a].time || "").localeCompare(groups[b].time || ""));
      const meals = order.map((gk) => {
        const g = groups[gk];
        return { time: g.time, type: abbr[g.type] || g.type, desc: g.items.join("、"),
          carb: g.p.carb, protein: g.p.protein, dairy: g.p.dairy, fruit: g.p.fruit, veg: g.p.veg, whey: g.p.whey, fat: g.p.fat };
      });
      return { date: k, weekday: WEEKDAYS[d.getDay()], weight: h.weight ?? "", water: h.water ?? "", steps: h.steps ?? "",
        sleep: h.sleep ?? "", bowel: h.bowel ?? 0, cardioDone: (h.cardio || 0) > 0, cardioMin: h.cardio || "",
        training: h.train || "", meals };
    });
    try {
      const res = await fetch(st.gasUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ days }) });
      const j = await res.json();
      if (j && j.ok) {
        const ws = new Date(); ws.setDate(ws.getDate() - ws.getDay());
        const at = new Date();
        update({ uploadedThrough: keys[keys.length - 1], lastUploadWeek: keyOf(ws),
          lastUploadAt: `${at.getMonth() + 1}/${at.getDate()} ${String(at.getHours()).padStart(2, "0")}:${String(at.getMinutes()).padStart(2, "0")}` });
        toast(`☁️ 已上傳 ${keys.length} 天資料`);
      } else throw new Error("bad response");

    L.push(st.weekSummary || "");

  const buildTSV = () => {

  /* ---------- series ---------- */

    return out;

  /* ---------- nutrition grid data ---------- */
  const buildCatCells = (key, cons = consumed, targets = tg) => {
    const cur = cons[key] || 0; const t = targets[key];
    const len = Math.max(t, Math.ceil(cur)) || 1;
    const cells = [];
    for (let i = 0; i < len; i++) cells.push({ frac: cur - i, over: i >= t });
    return cells;
  };
  const mk = (key, withLabel, cons = consumed, targets = tg) => {
    const c = CATS.find((x) => x.key === key);
    const cur = cons[key] || 0; const t = targets[key];
    return { frac: Math.min(1, cur), over: cur > t, label: withLabel ? { emoji: c.emoji, name: c.name } : null };
  };
  const secRowFor = (cons, targets) => [mk("dairy", false, cons, targets), { transparent: true }, { transparent: true }, { transparent: true }, mk("fruit", true, cons, targets), { gap: true }, { transparent: true }, { transparent: true }, { transparent: true }, mk("whey", true, cons, targets)];
  const secRow = secRowFor(consumed, tg);
  /* meal-page date-aware consumption */
  const consFor = (dk) => {
    const n = Object.fromEntries(CATS.map((c) => [c.key, 0]));
    mealsFor(dk).forEach((m) => CATS.forEach((c) => { n[c.key] += (m.portions && m.portions[c.key]) || 0; }));
    return n;
  };
  const mCons = consFor(mDate);
  const mIsT = (mDate === st.dayKey ? st.dayType : (((st.history[mDate] || {}).dayType) || "training")) === "training";
  const mTg = mIsT ? TRAIN : REST;
  /* weekly training progress (Sunday-start week) */
  const weekCells = (count, target) => {
    const len = Math.max(target, Math.ceil(count)) || 1;
    const cells = [];
    for (let i = 0; i < len; i++) cells.push({ frac: count - i, over: i >= target });
    return cells;
  };
  let wTrain = 0, wCardio = 0;
  {
    const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(ws.getDate() + i); const k = keyOf(d);
      if (k > st.dayKey) break;
      if (k === st.dayKey) {
        if (st.dayType === "training") wTrain++;
        if (st.cardioDone) wCardio++;
      } else {
        const h = st.history[k] || {};
        if (h.dayType === "training") wTrain++;
        if ((h.cardio || 0) > 0) wCardio++;
      }
    }
  }

  /* ---------- water cells ---------- */
  const wTarget = Math.ceil(WATER_GOAL / WATER_CELL);
  const wFilled = Math.floor(st.water / WATER_CELL);
  const waterCells = [];
  for (let i = 0; i < wTarget; i++) {
    const L = (i + 1) * WATER_CELL;
    waterCells.push({
      frac: i < wFilled ? 1 : 0, over: false,
      onClick: () => update((s) => { const v = s.water === L ? L - WATER_CELL : L; return { ...s, water: v, history: patchHist(s, { water: v }) }; }),
    });
  }

  /* ---------- plan derived ---------- */
  const planWeek = st.planWeek || 1;
  const planDay = st.planDay || 0;
  const curDay = PLAN_DAYS[planDay];
  const curItems = curDay.items.map((ex) => {
    const p = parseScheme(ex.s)[planWeek - 1];
    const backOff = p.sets === "3";
    const tags = (ex.tags || []).reduce((a, t) => a.concat(String(t).split("、")), []).map((x) => x.trim()).filter(Boolean);
    return { ...ex, tags, schemeLabel: `${p.reps} 下 × ${p.sets} 組`, backOff };
  });
  const weekBtnStyle = (w) => ({ flex: 1, padding: "9px 2px", borderRadius: 10, fontSize: 13, fontWeight: 700, border: "none", cursor: "pointer", background: planWeek === w ? (w === 3 ? ORANGE : A) : BTN_BG, color: planWeek === w ? "#fff" : SUB });
  const dayBtnStyle = (idx) => ({ flex: 1, padding: "9px 2px", borderRadius: 10, fontSize: 13, fontWeight: 700, border: "none", cursor: "pointer", background: planDay === idx ? (planWeek === 3 ? ORANGE : A) : BTN_BG, color: planDay === idx ? "#fff" : SUB });

  /* ---------- misc derived ---------- */

  const lastWeight = (() => {
    const ds = Object.keys(st.history).filter((k) => k < st.dayKey && st.history[k]?.weight != null).sort();
    return ds.length ? st.history[ds[ds.length - 1]].weight : null;
  })();
  const sleepMet = (parseFloat(st.sleep) || 0) >= 8;
  const stepsNum = parseInt(st.steps) || 0;

  const wl = seriesFor("weight").filter((p) => p.val != null);
  const weightLatest = wl.length ? fmt(wl[wl.length - 1].val) + " kg" : "尚無資料";

  const weekWeights = [];
  { let sum = 0, c = 0;
    const ws = new Date(now); ws.setDate(now.getDate() - now.getDay()); // Sunday = week start
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(ws.getDate() + i); const k = keyOf(d);
      const v = k === st.dayKey ? (parseFloat(st.weight) || null) : (st.history[k]?.weight ?? null);
      weekWeights.push({ date: `${d.getMonth() + 1}/${d.getDate()}`, val: v != null ? fmt(v) : "—" });
      if (v != null) { sum += v; c++; }
    }
    weekWeights.avg = c ? (sum / c).toFixed(2) + " kg" : "—";
  }

  const measDefs = [["hip", "臀圍 cm"], ["navelMid", "肚臍正中間 cm"], ["navelUp", "肚臍上五公分 cm"], ["navelDown", "肚臍下五公分 cm"], ["gripR", "握力右手 kg"], ["gripL", "握力左手 kg"]];

  /* ============ render ============ */
  return (
    <div style={{ minHeight: "100vh", background: PAGE_BG, fontFamily: `-apple-system,BlinkMacSystemFont,'PingFang TC','Heiti TC','Microsoft JhengHei',system-ui,sans-serif`, WebkitFontSmoothing: "antialiased" }}>
      <style>{`
        input:focus,select:focus,textarea:focus{outline:none}
        ::-webkit-scrollbar{width:0;height:0}
        input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
        input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:#EAE3D8;outline:none;padding:0;margin:10px 0 2px}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;border-radius:13px;background:#5A9B7C;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer}
        input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:10px;background:#5A9B7C;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer}
        @keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
      `}</style>
      <div style={{ maxWidth: 430, margin: "0 auto", minHeight: "100vh", background: APP_BG, position: "relative" }}>
        {/* scroll content */}
        <div style={{ padding: "14px 16px 120px" }}>

          {/* ===================== 今日 ===================== */}
          {tab === "today" && (
            <div>
              <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", margin: "6px 2px 16px" }}>
                <div>
                  <div style={titleStyle}>今日</div>
                  <div style={{ fontSize: 13, color: MUTED, marginTop: 2 }}>{now.getMonth() + 1}月{now.getDate()}日 週{WEEKDAYS[now.getDay()]}</div>
                </div>
                <div style={{ display: "flex", background: BORDER, borderRadius: 12, padding: 3 }}>
                  <button onClick={() => update({ dayType: "training" })} style={segBtn(isT)}>🔥 訓練日</button>
                  <button onClick={() => update({ dayType: "rest" })} style={segBtn(!isT)}>🌙 休息日</button>
                </div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8, margin: "0 0 14px" }}>
                <MetricCard emoji="😴" label="睡眠">
                  <div>
                    <input type="number" step="0.1" inputMode="decimal" value={st.sleep} placeholder="0" style={bigInput}
                      onChange={(e) => update({ sleep: e.target.value })} />
                    <div style={{ fontSize: 10.5, color: MUTED, fontWeight: 600 }}>/ 8 小時 {sleepMet ? "✓" : ""}</div>
                  </div>

                <MetricCard emoji="⚖️" label="體重">
                  <div>

                      onChange={(e) => update((s) => ({ ...s, weight: e.target.value, history: patchHist(s, { weight: parseFloat(e.target.value) || null }) }))} />
                    <div style={{ fontSize: 10.5, color: MUTED, fontWeight: 600 }}>{lastWeight != null ? `上次 ${fmt(lastWeight)} kg` : "無上次紀錄"}</div>
                  </div>

                <MetricCard emoji="👟" label="步數">
                  <div>

                    <div style={{ fontSize: 10.5, color: MUTED, fontWeight: 600 }}>/ {STEP_GOAL.toLocaleString()} 步 {stepsNum >= STEP_GOAL ? "🎉" : ""}</div>

              </div>

              {/* nutrition grid */}
              <div style={{ ...card, borderRadius: 20 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", margin: "0 0 16px" }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: INK }}>🍱 營養份數</div>
                  <span style={{ fontSize: 12, color: MUTED, fontWeight: 700 }}>{isT ? "訓練日" : "休息日"}目標</span>
                </div>
                {["carb", "protein", "fat", "veg"].map((key) => {
                  const c = CATS.find((x) => x.key === key);
                  return (
                    <div key={key} style={{ display: "flex", alignItems: "flex-start", gap: 8, margin: "0 0 12px" }}>
                      <div style={{ width: 72, flex: "none", display: "flex", alignItems: "center", gap: 6, fontSize: 14, fontWeight: 600, color: INK, paddingTop: 1, whiteSpace: "nowrap" }}>

                    style={{ padding: "7px 14px", background: A, color: "#fff", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>複製</button>
                </div>
                <pre style={{ margin: 0, background: SOFT, borderRadius: 12, padding: 14, fontSize: 12.5, lineHeight: 1.7, color: SUB, whiteSpace: "pre-wrap", fontFamily: MONO, maxHeight: 340, overflowY: "auto" }}>{buildReport()}</pre>
              </div>

              <div style={card}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: INK }}>📐 週報</div>
                  <button onClick={() => copy(buildWeekReport(), "已複製週報 ✓")}
                    style={{ padding: "7px 14px", background: A, color: "#fff", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>複製週報</button>
                </div>
                <div style={{ background: SOFT, borderRadius: 12, padding: "10px 14px", marginBottom: 14 }}>
                  {weekWeights.map((w, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
                      <span style={{ color: MUTED }}>{w.date}</span>
                      <span style={{ fontWeight: 700, color: INK, fontVariantNumeric: "tabular-nums" }}>{w.val}</span>
                    </div>
                  ))}
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 0 2px", marginTop: 6, borderTop: `1px solid ${BORDER}` }}>
                    <span style={{ fontSize: 14, color: SUB, fontWeight: 600 }}>七日平均體重</span>
                    <span style={{ fontSize: 17, fontWeight: 800, color: A, fontVariantNumeric: "tabular-nums" }}>{weekWeights.avg}</span>
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                  {measDefs.map(([k, label]) => (
                    <div key={k}>
                      <div style={{ fontSize: 12, color: MUTED, marginBottom: 4 }}>{label}</div>
                      <input type="number" step="0.1" inputMode="decimal" value={st.measure[k] || ""} placeholder="—"
                        onChange={(e) => update((s) => ({ ...s, measure: { ...s.measure, [k]: e.target.value } }))}
                        style={{ ...inputBase, width: "100%", boxSizing: "border-box" }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: MUTED, marginBottom: 6 }}>本週計劃執行狀況（睡眠、精神、飲食與訓練）</div>
                <textarea value={st.weekSummary} onChange={(e) => update({ weekSummary: e.target.value })}
                  placeholder="總結本週睡眠、精神、飲食與訓練…"
                  style={{ ...inputBase, width: "100%", minHeight: 82, boxSizing: "border-box", borderRadius: 11, padding: "11px 13px", fontWeight: 400, fontSize: 14, resize: "vertical", lineHeight: 1.5 }} />
              </div>

              <div style={card}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: INK }}>📤 TSV 匯出</div>
                  <button onClick={() => copy(buildTSV(), "已複製 TSV ✓")}
                    style={{ padding: "7px 14px", background: BTN_BG, color: A, border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>複製 TSV</button>
                </div>
                <pre style={{ margin: 0, background: SOFT, borderRadius: 12, padding: 12, fontSize: 11, lineHeight: 1.6, color: MUTED, whiteSpace: "pre", overflowX: "auto", fontFamily: MONO }}>{buildTSV()}</pre>
              </div>

              <div style={{ ...card, margin: 0 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: INK }}>☁️ 每週自動上傳</div>
                  <button onClick={() => doUpload(false)} disabled={uploading}
                    style={{ padding: "7px 14px", background: uploading ? BTN_BG : A, color: uploading ? MUTED : "#fff", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                    {uploading ? "上傳中…" : "立即上傳"}
                  </button>
                </div>
                <input value={st.gasUrl} onChange={(e) => update({ gasUrl: e.target.value.trim() })}
                  placeholder="貼上 Apps Script 網頁應用程式網址"
                  style={{ ...inputBase, width: "100%", boxSizing: "border-box", fontWeight: 400, fontSize: 13, marginBottom: 10 }} />
                <div style={{ fontSize: 11.5, color: MUTED, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {(st.lastUploadAt ? `上次 ${st.lastUploadAt} · 已傳至 ${Number(st.uploadedThrough.slice(5, 7))}/${Number(st.uploadedThrough.slice(8, 10))}` : "尚未上傳過") + " · 待傳 " + buildPendingDays().length + " 天"}
                </div>
              </div>
            </div>
          )}

          {/* ===================== 趨勢 ===================== */}
          {tab === "trend" && (
            <div>
              <div style={{ margin: "6px 2px 16px" }}><div style={titleStyle}>趨勢</div></div>
              <div style={card}>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 14 }}>
                  <div style={{ fontSize: 15, fontWeight: 600, color: INK }}>⚖️ 體重 · 14 天</div>
                  <span style={{ fontSize: 13, color: MUTED }}>{weightLatest}</span>
                </div>
                <LineChart series={seriesFor("weight")} unit=" kg" />
              </div>
              <div style={card}>
                <div style={{ fontSize: 15, fontWeight: 600, color: INK, marginBottom: 14 }}>👟 步數 · 目標 {STEP_GOAL.toLocaleString()}</div>
                <BarChart series={seriesFor("steps")} goal={STEP_GOAL} />
              </div>
              <div style={{ ...card, margin: 0 }}>
                <div style={{ fontSize: 15, fontWeight: 600, color: INK, marginBottom: 14 }}>💧 飲水量 · 14 天</div>
                <BarChart series={seriesFor("water")} goal={WATER_GOAL} />
              </div>
            </div>
          )}
        </div>

        {/* toast */}
        {toastMsg && (
          <div style={{ position: "fixed", bottom: 100, left: "50%", transform: "translateX(-50%)", background: "rgba(55,55,55,.96)", color: "#fff", padding: "11px 20px", borderRadius: 22, fontSize: 14, fontWeight: 600, zIndex: 40, animation: "toastIn .25s ease", whiteSpace: "nowrap", boxShadow: "0 8px 24px rgba(0,0,0,.3)" }}>{toastMsg}</div>
        )}

        {/* tab bar */}
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(250,246,240,.9)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderTop: "1px solid rgba(0,0,0,.07)", display: "flex", padding: "8px 0 max(8px, env(safe-area-inset-bottom))", zIndex: 30 }}>
          {[["today", "🔥", "今日"], ["meal", "🍽️", "記餐"], ["plan", "🏋️", "計畫"], ["report", "📋", "回報"], ["trend", "📈", "趨勢"]].map(([k, e, l]) => (
            <button key={k} onClick={() => setTab(k)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "transparent", border: "none", cursor: "pointer", padding: "4px 0" }}>
              <span style={{ fontSize: 23, lineHeight: 1, filter: tab === k ? "none" : "grayscale(1) opacity(.55)" }}>{e}</span>
              <span style={{ fontSize: 10.5, fontWeight: 600, color: tab === k ? A : MUTED }}>{l}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
